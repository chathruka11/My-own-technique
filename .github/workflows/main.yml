name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install Buildozer dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip colormake build-essential libltdl-dev libffi-dev libssl-dev python3-dev autoconf automake libtool pkg-config zlib1g-dev adb

      - name: Build with Buildozer
        run: |
          pip install buildozer cython
          buildozer android debug
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v2
        with:
          name: PusaAI-Package
          path: bin/*.apk
